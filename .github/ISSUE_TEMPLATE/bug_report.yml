name: Bug Report
description: Report a bug or unexpected behavior in openclaw-memory-core-plus
labels: ["bug"]
body:
  - type: dropdown
    id: bug_type
    attributes:
      label: Bug Type
      options:
        - Memory storage / retrieval failure
        - Plugin fails to load
        - Configuration issue
        - Crash / unhandled error
        - Performance problem
        - Other
    validations:
      required: true

  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      placeholder: |
        1. Configure plugin with ...
        2. Send message ...
        3. Observe ...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true

  - type: input
    id: plugin_version
    attributes:
      label: Plugin Version
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: input
    id: openclaw_version
    attributes:
      label: OpenClaw Version
      placeholder: "e.g. 2026.3.7"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Operating System
      placeholder: "e.g. macOS 15, Ubuntu 22.04"
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / Evidence
      description: Paste relevant log output or screenshots here.
      render: shell
